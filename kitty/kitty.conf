# BEGIN_KITTY_THEME
# Catppuccin-Mocha
include current-theme.conf
# END_KITTY_THEME

font_family      JetBrainsMono Nerd Font
font_size        10.0

background_opacity 0.97
background_blur    50

window_padding_width 10
confirm_os_window_close 0

shell_integration no-cursor
cursor_shape block

# Map a custom shorthand for closing term window
map alt+super+c close_window

# Remove titlebar (i mean the default one is kindly ugly)
hide_window_decorations yes
